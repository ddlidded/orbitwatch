# Easypanel-ready Docker Compose stack for OrbitWatch
# Use this file when deploying via Easypanel's "Compose" service type.
# Set all required environment variables in the Easypanel UI before deploying.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-orbitwatch}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orbitwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-orbitwatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-orbitwatch}-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ${PROJECT_NAME:-orbitwatch}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me-in-production}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: orbitwatch-backend
    container_name: ${PROJECT_NAME:-orbitwatch}-backend
    restart: unless-stopped
    environment:
      ORBITWATCH_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-orbitwatch}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-orbitwatch}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ORBITWATCH_ADMIN_PASSWORD: ${ORBITWATCH_ADMIN_PASSWORD:-}
      AGENT_BOOTSTRAP_TOKEN: ${AGENT_BOOTSTRAP_TOKEN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,https://localhost}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-in-production}
      S3_BUCKET: ${S3_BUCKET:-orbitwatch}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  worker:
    image: orbitwatch-backend
    container_name: ${PROJECT_NAME:-orbitwatch}-worker
    restart: unless-stopped
    environment:
      ORBITWATCH_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-orbitwatch}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-orbitwatch}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-in-production}
      S3_BUCKET: ${S3_BUCKET:-orbitwatch}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      backend:
        condition: service_healthy
    command: dramatiq app.tasks --processes 2 --threads 4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-orbitwatch}-frontend
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  miniodata:
